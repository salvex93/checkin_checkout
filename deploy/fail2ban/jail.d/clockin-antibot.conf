# Jail para Clock System anti-bot.
# Activa el filtro clockin-antibot sobre el log de PHP/Apache donde aterriza
# error_log() del modulo public/api/anti_bot.php.
#
# Ajustar `logpath` segun el hosting:
#   - Servidor dedicado / VPS Ubuntu:    /var/log/apache2/error.log
#   - cPanel (GoDaddy/Hostgator):        /home/<user>/logs/<dominio>/error_log
#                                        o /usr/local/apache/logs/error_log
#   - PHP-FPM standalone:                /var/log/php-fpm/www-error.log
#
# Ajustar `bantime` y `findtime` segun politica operativa.

[clockin-antibot]
enabled  = true
filter   = clockin-antibot
backend  = polling
logpath  = /home/z90qbbt5eewc/logs/app.meliusservices.com/error_log

# Umbrales: cualquier bloqueo cuenta. 3 intentos en 10 min -> ban 1h.
# Subir maxretry a 5+ si hay falsos positivos con monitoring externo.
maxretry = 3
findtime = 600
bantime  = 3600

# Accion: iptables-multiport bloquea 80/443. En cPanel suele usarse cphulkd o
# csf en lugar de fail2ban directo; en ese caso solo se usa este filter para
# alimentar reportes.
action = iptables-multiport[name=clockin-antibot, port="http,https", protocol=tcp]
