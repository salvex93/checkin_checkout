# Fail2ban filter para Clock System anti-bot.
# Empareja el log JSON estructurado emitido por public/api/anti_bot.php:
#   [anti-bot] {"event":"anti_bot_block","reason":"...","ip":"X.X.X.X","ua":"...","uri":"...","ts":"..."}
# La IP del cliente bloqueado se extrae con <HOST>.
#
# Probar con:
#   fail2ban-regex /var/log/apache2/error.log /etc/fail2ban/filter.d/clockin-antibot.conf

[Definition]

# El patron busca el prefijo [anti-bot] seguido del JSON con la IP entre comillas.
# Acepta cualquier orden de claves antes de "ip" para no romperse si el JSON cambia.
failregex = \[anti-bot\] \{.*?"ip":"<HOST>".*?\}

# No ignorar lineas que parecen normales: cualquier match es un bloqueo intencional.
ignoreregex =

# Fail2ban version >=0.10 soporta IPv6 via <HOST>. Para 0.9 se usaba <ADDR>.
datepattern = ^(?:\[)?%%Y-%%m-%%d[T ]%%H:%%M:%%S(?:[.,]%%f)?(?:Z|[+-]%%H:?%%M)?(?:\])?
