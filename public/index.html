<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="color-scheme" content="light dark">
    <meta name="description" content="Portal de control de jornada laboral - Melius Services">
    <title>Clock System - Melius Services</title>

    <!-- Tailwind via CDN. SRI: en proyectos productivos con build, precompilar a JS plano. -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Configuracion Tailwind ANTES del primer paint para evitar flash blanco.
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { screens: { xs: '375px' } } }
        };
        (function applyInitialTheme() {
            try {
                const stored = localStorage.getItem('melius.theme');
                const preferDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                if (stored === 'dark' || (!stored && preferDark)) {
                    document.documentElement.classList.add('dark');
                }
            } catch (_) { /* localStorage puede fallar en modo privado */ }
        })();
    </script>

    <!-- React + Babel via CDN con SRI (Subresource Integrity).
         Si en algun momento se actualiza la version, regenerar los hashes con:
         curl -s https://unpkg.com/react@18.3.1/umd/react.production.min.js | openssl dgst -sha384 -binary | openssl base64 -A -->
    <script
        src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"
        integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z"
        crossorigin="anonymous"></script>
    <script
        src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"
        integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1"
        crossorigin="anonymous"></script>
    <script
        src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"
        integrity="sha384-AISI5AuDG6E8DeEiFMVB3rGQxhZt24OU0avMp+GMV64+tpnA3+Z6F5MT0f96iPva"
        crossorigin="anonymous"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        html, body { background-color: #f8fafc; }
        html.dark, html.dark body { background-color: #0b1220; }
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        html.dark .custom-scrollbar::-webkit-scrollbar-track { background: #1f2937; }
        html.dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #374151; }
        html.dark .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #4b5563; }
        .no-select { user-select: none; -webkit-user-select: none; }
        /* Safe area iOS notch */
        .safe-top { padding-top: max(env(safe-area-inset-top), 0px); }
        .safe-bottom { padding-bottom: max(env(safe-area-inset-bottom), 0px); }
        @keyframes meliusFadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes meliusZoomIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
        .anim-fade-in { animation: meliusFadeIn 220ms ease-out both; }
        .anim-zoom-in { animation: meliusZoomIn 200ms ease-out both; }
        @media (prefers-reduced-motion: reduce) {
            .anim-fade-in, .anim-zoom-in, .animate-pulse, .animate-spin { animation: none !important; }
            * { transition-duration: 0ms !important; }
        }
        /* Touch target minimo 44x44 (WCAG AA mobile) */
        button, [role="button"], input, select { min-height: 44px; }
        /* Toast container */
        .toast-stack { position: fixed; top: 1rem; right: 1rem; left: 1rem; z-index: 60; display: flex; flex-direction: column; gap: 0.5rem; pointer-events: none; }
        @media (min-width: 640px) { .toast-stack { left: auto; max-width: 24rem; } }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-100 transition-colors safe-top safe-bottom">
    <noscript>
        <div style="padding:2rem;text-align:center;font-family:sans-serif">
            Esta aplicacion requiere JavaScript habilitado. Por favor activalo y recarga.
        </div>
    </noscript>
    <div id="root"></div>

    <script type="text/babel" data-presets="env,react">
        const { useState, useEffect, useMemo, useRef, useCallback } = React;

        // =====================================================================
        // API client: wrapper unico con CSRF, credenciales de sesion y manejo
        // de 401 -> logout cliente. NUNCA leemos datos de negocio de localStorage.
        // =====================================================================

        const API_BASE = '/api';
        let CSRF_TOKEN = null;

        async function apiFetch(path, { method = 'GET', body = null } = {}) {
            const headers = { 'Accept': 'application/json' };
            if (body !== null) headers['Content-Type'] = 'application/json';
            if (CSRF_TOKEN && method !== 'GET') headers['X-CSRF-Token'] = CSRF_TOKEN;

            let res;
            try {
                res = await fetch(`${API_BASE}/${path.replace(/^\//, '')}`, {
                    method,
                    credentials: 'same-origin',
                    headers,
                    body: body !== null ? JSON.stringify(body) : null
                });
            } catch (e) {
                throw { code: 'NETWORK_ERROR', message: 'Sin conexion con el servidor.' };
            }

            let payload;
            try { payload = await res.json(); }
            catch (_) { payload = { ok: false, error: { code: 'BAD_RESPONSE', message: 'Respuesta no JSON.' } }; }

            if (!res.ok || !payload.ok) {
                const err = payload.error || { code: 'UNKNOWN', message: `HTTP ${res.status}` };
                // Si la sesion expiro, limpiar estado local. El App detecta via /auth/me.
                if (res.status === 401) err._auth = true;
                throw err;
            }
            return payload.data;
        }

        async function fetchCsrf() {
            const d = await apiFetch('csrf');
            CSRF_TOKEN = d.csrf_token;
        }

        // =====================================================================
        // Sistema de toasts (reemplaza alert() — alert es modal blocking y feo)
        // =====================================================================

        const ToastContext = React.createContext({ push: () => {} });

        const ToastProvider = ({ children }) => {
            const [toasts, setToasts] = useState([]);
            const push = useCallback((type, message) => {
                const id = Date.now() + Math.random();
                setToasts(t => [...t, { id, type, message }]);
                setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 4500);
            }, []);
            return (
                <ToastContext.Provider value={{ push }}>
                    {children}
                    <div className="toast-stack" role="status" aria-live="polite">
                        {toasts.map(t => (
                            <div key={t.id}
                                className={`pointer-events-auto rounded-2xl px-4 py-3 shadow-lg border text-sm font-medium anim-fade-in ${
                                    t.type === 'error' ? 'bg-red-50 dark:bg-red-900/40 border-red-200 dark:border-red-800 text-red-700 dark:text-red-200' :
                                    t.type === 'success' ? 'bg-emerald-50 dark:bg-emerald-900/40 border-emerald-200 dark:border-emerald-800 text-emerald-700 dark:text-emerald-200' :
                                    'bg-blue-50 dark:bg-blue-900/40 border-blue-200 dark:border-blue-800 text-blue-700 dark:text-blue-200'
                                }`}>
                                {t.message}
                            </div>
                        ))}
                    </div>
                </ToastContext.Provider>
            );
        };
        const useToast = () => React.useContext(ToastContext);

        // =====================================================================
        // Iconos (SVG inline para evitar dependencias)
        // =====================================================================

        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                Clock: <path d="M12 6v6l4 2"/>,
                LogIn: <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3"/>,
                LogOut: <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/>,
                History: (<><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5M12 7v5l4 2"/></>),
                ShieldCheck: (<><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></>),
                FileText: (<><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></>),
                ArrowLeftRight: <path d="M8 3 4 7l4 4M4 7h16M16 21l4-4-4-4M20 17H4"/>,
                Check: <path d="M20 6 9 17l-5-5"/>,
                X: <path d="M18 6 6 18M6 6l12 12"/>,
                Mail: (<><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></>),
                Lock: (<><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></>),
                Sun: (<><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></>),
                Moon: <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>,
                Hourglass: <path d="M5 22h14M5 2h14M17 22v-4.172a2 2 0 0 0-.586-1.414L12 12l-4.414 4.414A2 2 0 0 0 7 17.828V22M7 2v4.172a2 2 0 0 0 .586 1.414L12 12l4.414-4.414A2 2 0 0 0 17 6.172V2"/>,
                AlertTriangle: (<><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></>),
                Spinner: <circle cx="12" cy="12" r="10" strokeDasharray="40" strokeDashoffset="10"/>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
                    className={className + (name === 'Spinner' ? ' animate-spin' : '')} aria-hidden="true" focusable="false">
                    {icons[name] || null}
                </svg>
            );
        };

        const ThemeToggle = ({ theme, onToggle }) => (
            <button type="button" onClick={onToggle}
                aria-label={theme === 'dark' ? 'Cambiar a tema claro' : 'Cambiar a tema oscuro'}
                className="p-3 rounded-2xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-200 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500">
                <Icon name={theme === 'dark' ? 'Sun' : 'Moon'} size={18} />
            </button>
        );

        // =====================================================================
        // Modal accesible (ESC, click fuera, role=dialog, foco inicial)
        // =====================================================================

        const Modal = ({ open, onClose, title, children, maxWidth = 'max-w-md', dismissible = true }) => {
            const dialogRef = useRef(null);
            useEffect(() => {
                if (!open) return;
                const onKey = (e) => { if (e.key === 'Escape' && dismissible) onClose(); };
                document.addEventListener('keydown', onKey);
                const t = setTimeout(() => {
                    const focusable = dialogRef.current?.querySelector('input, button, select, textarea, [tabindex]:not([tabindex="-1"])');
                    focusable?.focus();
                }, 30);
                return () => { document.removeEventListener('keydown', onKey); clearTimeout(t); };
            }, [open, onClose, dismissible]);
            if (!open) return null;
            return (
                <div className="fixed inset-0 bg-slate-900/60 dark:bg-black/70 backdrop-blur-md z-50 flex items-center justify-center p-4 sm:p-6"
                    onMouseDown={(e) => { if (dismissible && e.target === e.currentTarget) onClose(); }}
                    role="presentation">
                    <div ref={dialogRef} role="dialog" aria-modal="true" aria-label={title}
                        className={`bg-white dark:bg-slate-900 w-full ${maxWidth} max-h-[90vh] overflow-y-auto custom-scrollbar rounded-3xl sm:rounded-[2.5rem] p-6 sm:p-10 shadow-2xl border border-slate-100 dark:border-slate-800 anim-zoom-in`}>
                        {children}
                    </div>
                </div>
            );
        };

        // =====================================================================
        // Componentes de loading / error / vacio (estados explicitos — Regla
        // tech-lead-frontend: ningun estado puede ser silencioso)
        // =====================================================================

        const LoadingScreen = () => (
            <div className="min-h-screen flex flex-col items-center justify-center gap-4 text-slate-400 dark:text-slate-500">
                <Icon name="Spinner" size={32} />
                <p className="text-xs uppercase tracking-widest font-bold">Cargando</p>
            </div>
        );

        const ErrorState = ({ message, onRetry }) => (
            <div className="bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-800 rounded-3xl p-6 text-center">
                <p className="text-red-700 dark:text-red-300 font-bold mb-3">{message}</p>
                {onRetry && (
                    <button onClick={onRetry} className="text-xs font-black uppercase tracking-widest text-red-600 dark:text-red-300 underline">
                        Reintentar
                    </button>
                )}
            </div>
        );

        const EmptyState = ({ message }) => (
            <div className="text-center py-12 sm:py-20 text-slate-300 dark:text-slate-600 italic font-medium">
                {message}
            </div>
        );

        // =====================================================================
        // App principal
        // =====================================================================

        const App = () => {
            const { push: toast } = useToast();
            const [view, setView] = useState('loading');     // loading | login | register | admin-login | dashboard | admin-panel
            const [currentUser, setCurrentUser] = useState(null);
            const [theme, setTheme] = useState(() => (document.documentElement.classList.contains('dark') ? 'dark' : 'light'));
            const [companies, setCompanies] = useState([]);
            const [submitting, setSubmitting] = useState(false);

            const toggleTheme = useCallback(() => {
                setTheme(prev => {
                    const next = prev === 'dark' ? 'light' : 'dark';
                    document.documentElement.classList.toggle('dark', next === 'dark');
                    try { localStorage.setItem('melius.theme', next); } catch (_) {}
                    return next;
                });
            }, []);

            // Hidratacion: pedir CSRF y luego /auth/me
            useEffect(() => {
                (async () => {
                    try {
                        await fetchCsrf();
                        try {
                            const me = await apiFetch('auth/me');
                            CSRF_TOKEN = me.csrf_token || CSRF_TOKEN;
                            setCurrentUser(me.user);
                            setView(me.user.role === 'admin' ? 'admin-panel' : 'dashboard');
                        } catch (e) {
                            if (e._auth) setView('login'); else { toast('error', e.message); setView('login'); }
                        }
                    } catch (e) {
                        toast('error', e.message || 'Error al iniciar.');
                        setView('login');
                    }
                })();
            }, []);

            // Cargar empresas cuando se necesite (register / change-company)
            const loadCompanies = useCallback(async () => {
                try {
                    const d = await apiFetch('companies');
                    setCompanies(d.companies || []);
                } catch (e) { toast('error', e.message); }
            }, [toast]);

            const handleLogin = async (e) => {
                e.preventDefault();
                if (submitting) return;
                const data = new FormData(e.target);
                setSubmitting(true);
                try {
                    const d = await apiFetch('auth/login', {
                        method: 'POST',
                        body: { email: data.get('email'), password: data.get('password') }
                    });
                    CSRF_TOKEN = d.csrf_token || CSRF_TOKEN;
                    setCurrentUser(d.user);
                    setView(d.user.role === 'admin' ? 'admin-panel' : 'dashboard');
                    toast('success', `Bienvenido, ${d.user.name}`);
                } catch (err) {
                    toast('error', err.message || 'No se pudo iniciar sesion.');
                } finally { setSubmitting(false); }
            };

            const handleRegister = async (e) => {
                e.preventDefault();
                if (submitting) return;
                const data = new FormData(e.target);
                setSubmitting(true);
                try {
                    await apiFetch('auth/register', {
                        method: 'POST',
                        body: {
                            name: data.get('name'),
                            email: data.get('email'),
                            password: data.get('password'),
                            company_id: parseInt(data.get('company_id'), 10)
                        }
                    });
                    toast('success', 'Registro recibido. Ya puedes iniciar sesion.');
                    setView('login');
                } catch (err) {
                    toast('error', err.message || 'No se pudo completar el registro.');
                } finally { setSubmitting(false); }
            };

            const handleLogout = async () => {
                try { await apiFetch('auth/logout', { method: 'POST' }); }
                catch (_) {}
                setCurrentUser(null);
                CSRF_TOKEN = null;
                await fetchCsrf();
                setView('login');
            };

            // === Routing ===
            if (view === 'loading') return <LoadingScreen />;

            return (
                <div className="min-h-screen flex flex-col items-center justify-center py-6 sm:py-10 px-4">
                    {view === 'login' && (
                        <LoginCard
                            onSubmit={handleLogin}
                            submitting={submitting}
                            onGoRegister={() => { loadCompanies(); setView('register'); }}
                            theme={theme}
                            onToggleTheme={toggleTheme}
                        />
                    )}

                    {view === 'register' && (
                        <RegisterCard
                            companies={companies}
                            onSubmit={handleRegister}
                            submitting={submitting}
                            onBack={() => setView('login')}
                            theme={theme}
                            onToggleTheme={toggleTheme}
                        />
                    )}

                    {view === 'dashboard' && currentUser && (
                        <UserDashboard
                            currentUser={currentUser}
                            onLogout={handleLogout}
                            theme={theme}
                            onToggleTheme={toggleTheme}
                            companies={companies}
                            loadCompanies={loadCompanies}
                        />
                    )}

                    {view === 'admin-panel' && currentUser && (
                        <AdminPanel
                            currentUser={currentUser}
                            onLogout={handleLogout}
                            theme={theme}
                            onToggleTheme={toggleTheme}
                        />
                    )}

                    <footer className="mt-8 sm:mt-12 text-center text-slate-300 dark:text-slate-600 font-bold text-[10px] uppercase tracking-[0.5em] sm:tracking-[0.8em]">
                        Melius Services · Infrastructure
                    </footer>
                </div>
            );
        };

        // =====================================================================
        // Vistas
        // =====================================================================

        const LoginCard = ({ onSubmit, submitting, onGoRegister, theme, onToggleTheme }) => (
            <div className="max-w-md w-full bg-white dark:bg-slate-900 p-6 sm:p-10 md:p-12 rounded-[2rem] sm:rounded-[3rem] md:rounded-[4rem] shadow-2xl dark:shadow-black/50 border border-slate-100 dark:border-slate-800 flex flex-col items-center anim-zoom-in relative">
                <div className="absolute top-4 right-4 sm:top-6 sm:right-6"><ThemeToggle theme={theme} onToggle={onToggleTheme} /></div>
                <div className="bg-blue-600 w-16 h-16 sm:w-24 sm:h-24 rounded-2xl sm:rounded-[2rem] flex items-center justify-center mb-6 sm:mb-8 shadow-2xl shadow-blue-200 dark:shadow-blue-900/40">
                    <Icon name="Clock" className="text-white w-8 h-8 sm:w-12 sm:h-12" />
                </div>
                <h1 className="text-2xl sm:text-3xl md:text-4xl font-black text-slate-800 dark:text-slate-100 mb-2 tracking-tighter text-center">Clock System</h1>
                <p className="text-slate-400 dark:text-slate-500 font-black uppercase tracking-[0.3em] sm:tracking-[0.4em] text-[9px] sm:text-[10px] mb-8 sm:mb-12 text-center">Melius Services Portal</p>

                <form onSubmit={onSubmit} className="w-full space-y-4 sm:space-y-5">
                    <div className="space-y-1">
                        <label htmlFor="login-email" className="text-[10px] font-black uppercase text-slate-400 dark:text-slate-500 ml-4 sm:ml-5 tracking-widest block">Email Corporativo</label>
                        <input id="login-email" name="email" type="email" placeholder="usuario@melius.com" required autoComplete="email"
                            className="w-full px-6 sm:px-8 py-4 sm:py-5 rounded-2xl sm:rounded-3xl border-2 border-slate-50 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 dark:text-slate-100 outline-none focus:border-blue-500 focus:bg-white dark:focus:bg-slate-900 transition-all font-medium" />
                    </div>
                    <div className="space-y-1">
                        <label htmlFor="login-password" className="text-[10px] font-black uppercase text-slate-400 dark:text-slate-500 ml-4 sm:ml-5 tracking-widest block">Contraseña</label>
                        <input id="login-password" name="password" type="password" required autoComplete="current-password" minLength="1"
                            className="w-full px-6 sm:px-8 py-4 sm:py-5 rounded-2xl sm:rounded-3xl border-2 border-slate-50 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 dark:text-slate-100 outline-none focus:border-blue-500 focus:bg-white dark:focus:bg-slate-900 transition-all font-medium" />
                    </div>
                    <button type="submit" disabled={submitting}
                        className="w-full bg-blue-600 text-white py-4 sm:py-5 rounded-2xl sm:rounded-3xl font-black text-lg sm:text-xl hover:bg-blue-700 shadow-xl shadow-blue-200 dark:shadow-blue-900/40 transition-all active:scale-95 no-select disabled:opacity-60 disabled:cursor-wait flex items-center justify-center gap-3">
                        {submitting && <Icon name="Spinner" size={20} />}
                        {submitting ? 'Validando' : 'Entrar'}
                    </button>
                </form>

                <div className="mt-8 sm:mt-12 flex flex-col items-center gap-4 sm:gap-5">
                    <button onClick={onGoRegister} className="text-blue-600 dark:text-blue-300 font-black text-xs uppercase tracking-widest hover:underline transition-all">
                        Registrar nuevo consultor
                    </button>
                </div>
            </div>
        );

        const RegisterCard = ({ companies, onSubmit, submitting, onBack, theme, onToggleTheme }) => (
            <div className="max-w-md w-full bg-white dark:bg-slate-900 p-6 sm:p-10 md:p-12 rounded-[2rem] sm:rounded-[3rem] shadow-2xl dark:shadow-black/50 border border-slate-100 dark:border-slate-800 anim-fade-in relative">
                <div className="absolute top-4 right-4 sm:top-6 sm:right-6"><ThemeToggle theme={theme} onToggle={onToggleTheme} /></div>
                <h2 className="text-2xl sm:text-3xl font-black text-slate-800 dark:text-slate-100 mb-8 sm:mb-10 tracking-tight">Alta de Consultor</h2>
                <form onSubmit={onSubmit} className="space-y-4 sm:space-y-5">
                    <div className="space-y-1">
                        <label htmlFor="reg-name" className="text-[10px] font-black uppercase text-slate-400 dark:text-slate-500 ml-4 tracking-widest block">Nombre Completo</label>
                        <input id="reg-name" name="name" required minLength="2" maxLength="120" autoComplete="name"
                            className="w-full px-6 sm:px-7 py-4 rounded-2xl sm:rounded-3xl border-2 border-slate-50 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 dark:text-slate-100 outline-none focus:border-slate-900 dark:focus:border-blue-500 focus:bg-white dark:focus:bg-slate-900 transition-all font-medium" />
                    </div>
                    <div className="space-y-1">
                        <label htmlFor="reg-email" className="text-[10px] font-black uppercase text-slate-400 dark:text-slate-500 ml-4 tracking-widest block">Email Corporativo</label>
                        <input id="reg-email" name="email" type="email" required autoComplete="email"
                            className="w-full px-6 sm:px-7 py-4 rounded-2xl sm:rounded-3xl border-2 border-slate-50 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 dark:text-slate-100 outline-none focus:border-slate-900 dark:focus:border-blue-500 focus:bg-white dark:focus:bg-slate-900 transition-all font-medium" />
                    </div>
                    <div className="space-y-1">
                        <label htmlFor="reg-password" className="text-[10px] font-black uppercase text-slate-400 dark:text-slate-500 ml-4 tracking-widest block">Contraseña (min 10 caracteres)</label>
                        <input id="reg-password" name="password" type="password" required minLength="10" maxLength="200" autoComplete="new-password"
                            className="w-full px-6 sm:px-7 py-4 rounded-2xl sm:rounded-3xl border-2 border-slate-50 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 dark:text-slate-100 outline-none focus:border-slate-900 dark:focus:border-blue-500 focus:bg-white dark:focus:bg-slate-900 transition-all font-medium" />
                    </div>
                    <div className="space-y-1">
                        <label htmlFor="reg-company" className="text-[10px] font-black uppercase text-slate-400 dark:text-slate-500 ml-4 tracking-widest block">Empresa Asignada</label>
                        <select id="reg-company" name="company_id" required
                            className="w-full px-6 sm:px-7 py-4 rounded-2xl sm:rounded-3xl border-2 border-slate-50 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 dark:text-slate-100 outline-none font-bold appearance-none cursor-pointer">
                            <option value="">— Selecciona empresa —</option>
                            {companies.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                        </select>
                    </div>
                    <button type="submit" disabled={submitting}
                        className="w-full bg-slate-900 dark:bg-blue-600 text-white py-4 sm:py-5 rounded-2xl sm:rounded-3xl font-black mt-6 hover:bg-black dark:hover:bg-blue-700 transition-all shadow-xl active:scale-95 disabled:opacity-60 flex items-center justify-center gap-3">
                        {submitting && <Icon name="Spinner" size={20} />}
                        {submitting ? 'Registrando' : 'Completar Registro'}
                    </button>
                    <button type="button" onClick={onBack} className="w-full py-2 text-slate-400 dark:text-slate-500 font-bold text-xs uppercase tracking-widest">Cancelar</button>
                </form>
            </div>
        );

        // =====================================================================
        // Dashboard de usuario
        // =====================================================================

        const UserDashboard = ({ currentUser, onLogout, theme, onToggleTheme, companies, loadCompanies }) => {
            const { push: toast } = useToast();
            const [todayRecord, setTodayRecord] = useState(null);
            const [logs, setLogs] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [showChangeModal, setShowChangeModal] = useState(false);
            const [showOvertimeModal, setShowOvertimeModal] = useState(false);
            const [pendingDecision, setPendingDecision] = useState(null);
            const [submitting, setSubmitting] = useState(false);

            const refresh = useCallback(async () => {
                setLoading(true); setError(null);
                try {
                    const [today, mine] = await Promise.all([
                        apiFetch('records/today'),
                        apiFetch('records/mine?limit=5')
                    ]);
                    setTodayRecord(today.record);
                    setLogs(mine.records);
                } catch (e) {
                    setError(e.message || 'Error al cargar datos.');
                } finally { setLoading(false); }
            }, []);

            useEffect(() => { refresh(); }, [refresh]);

            const handleClockIn = async (extraBody = {}) => {
                if (submitting) return;
                setSubmitting(true);
                try {
                    const d = await apiFetch('records/clockin', { method: 'POST', body: extraBody });
                    if (d.decision_required) {
                        setPendingDecision({ priorRecord: d.prior_record, rule: d.rule });
                        return;
                    }
                    setPendingDecision(null);
                    setTodayRecord(d.record);
                    toast('success', 'Entrada registrada.');
                    refresh();
                } catch (e) {
                    toast('error', e.message);
                } finally { setSubmitting(false); }
            };

            const handleClockOut = async () => {
                if (submitting) return;
                setSubmitting(true);
                try {
                    const d = await apiFetch('records/clockout', { method: 'POST' });
                    setTodayRecord(d.record);
                    toast('success', 'Salida registrada.');
                    refresh();
                } catch (e) {
                    toast('error', e.message);
                } finally { setSubmitting(false); }
            };

            const userCompany = useMemo(() =>
                companies.find(c => c.id === currentUser.company_id), [companies, currentUser]);

            return (
                <div className="max-w-4xl w-full flex flex-col gap-6 sm:gap-8 anim-fade-in">
                    {/* Header */}
                    <div className="flex flex-col md:flex-row justify-between items-center bg-white dark:bg-slate-900 p-6 sm:p-8 rounded-[2rem] sm:rounded-[2.5rem] shadow-xl dark:shadow-black/40 border border-slate-100 dark:border-slate-800 gap-4 md:gap-6">
                        <div className="flex items-center gap-4 sm:gap-5 w-full md:w-auto">
                            <div className="w-14 h-14 sm:w-16 sm:h-16 bg-blue-600 rounded-2xl flex items-center justify-center text-white text-2xl sm:text-3xl font-black shadow-lg shadow-blue-200 dark:shadow-blue-900/40 shrink-0">
                                {currentUser.name[0]?.toUpperCase()}
                            </div>
                            <div className="min-w-0">
                                <h2 className="text-xl sm:text-2xl font-black text-slate-800 dark:text-slate-100 tracking-tight truncate">{currentUser.name}</h2>
                                <div className="flex items-center gap-2 sm:gap-3 mt-1 flex-wrap">
                                    <span className="text-[11px] sm:text-xs font-bold px-2.5 sm:px-3 py-1 bg-blue-50 dark:bg-blue-900/40 text-blue-600 dark:text-blue-300 rounded-full">
                                        {userCompany?.name || 'Sin empresa'}
                                    </span>
                                    <button onClick={() => { if (!companies.length) loadCompanies(); setShowChangeModal(true); }}
                                        className="text-[9px] sm:text-[10px] font-black text-slate-400 dark:text-slate-500 hover:text-blue-500 dark:hover:text-blue-300 uppercase tracking-widest underline transition-all">
                                        ¿Empresa incorrecta?
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div className="flex items-center gap-2 w-full md:w-auto justify-end">
                            <ThemeToggle theme={theme} onToggle={onToggleTheme} />
                            <button onClick={onLogout}
                                className="px-4 sm:px-6 py-2.5 sm:py-3 bg-slate-50 dark:bg-slate-800 text-slate-400 dark:text-slate-300 rounded-2xl font-bold text-sm hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 transition-all">
                                Cerrar Sesion
                            </button>
                        </div>
                    </div>

                    {loading && <LoadingScreen />}
                    {error && !loading && <ErrorState message={error} onRetry={refresh} />}

                    {!loading && !error && (
                        <>
                            {/* Acciones principales */}
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 sm:gap-6 md:gap-8">
                                <button onClick={() => handleClockIn()} disabled={!!todayRecord || submitting} aria-label="Marcar entrada"
                                    className={`p-6 sm:p-8 md:p-10 rounded-[2rem] sm:rounded-[3rem] border-4 transition-all flex flex-col items-center gap-4 sm:gap-5 no-select ${
                                        todayRecord
                                            ? 'bg-slate-50 dark:bg-slate-900/50 border-slate-100 dark:border-slate-800 opacity-60 grayscale cursor-not-allowed'
                                            : 'bg-white dark:bg-slate-900 border-blue-50 dark:border-blue-900/40 hover:border-blue-400 dark:hover:border-blue-500 shadow-2xl shadow-blue-900/5 dark:shadow-blue-950/40 active:scale-95'
                                    }`}>
                                    <div className={`p-4 sm:p-6 rounded-2xl sm:rounded-3xl ${todayRecord ? 'bg-slate-200 dark:bg-slate-800 text-slate-400 dark:text-slate-600' : 'bg-blue-600 text-white shadow-xl shadow-blue-200 dark:shadow-blue-900/40'}`}>
                                        <Icon name="LogIn" size={28} className="sm:hidden" />
                                        <Icon name="LogIn" size={36} className="hidden sm:block" />
                                    </div>
                                    <div className="text-center">
                                        <span className="block font-black text-xl sm:text-2xl uppercase tracking-tighter text-slate-800 dark:text-slate-100">Entrada</span>
                                        {todayRecord && <span className="text-blue-600 dark:text-blue-300 font-black font-mono text-xs sm:text-sm uppercase bg-blue-50 dark:bg-blue-900/40 px-3 py-1 rounded-lg mt-2 inline-block">Registrada: {todayRecord.entry_time}</span>}
                                    </div>
                                </button>

                                <button onClick={handleClockOut} disabled={!todayRecord || !!todayRecord?.exit_time || submitting} aria-label="Marcar salida"
                                    className={`p-6 sm:p-8 md:p-10 rounded-[2rem] sm:rounded-[3rem] border-4 transition-all flex flex-col items-center gap-4 sm:gap-5 no-select ${
                                        (!todayRecord || todayRecord?.exit_time)
                                            ? 'bg-slate-50 dark:bg-slate-900/50 border-slate-100 dark:border-slate-800 opacity-60 grayscale cursor-not-allowed'
                                            : 'bg-white dark:bg-slate-900 border-orange-50 dark:border-orange-900/40 hover:border-orange-400 dark:hover:border-orange-500 shadow-2xl shadow-orange-900/5 dark:shadow-orange-950/40 active:scale-95'
                                    }`}>
                                    <div className={`p-4 sm:p-6 rounded-2xl sm:rounded-3xl ${(!todayRecord || todayRecord?.exit_time) ? 'bg-slate-200 dark:bg-slate-800 text-slate-400 dark:text-slate-600' : 'bg-orange-600 text-white shadow-xl shadow-orange-200 dark:shadow-orange-900/40'}`}>
                                        <Icon name="LogOut" size={28} className="sm:hidden" />
                                        <Icon name="LogOut" size={36} className="hidden sm:block" />
                                    </div>
                                    <div className="text-center">
                                        <span className="block font-black text-xl sm:text-2xl uppercase tracking-tighter text-slate-800 dark:text-slate-100">Salida</span>
                                        {todayRecord?.exit_time && <span className="text-orange-600 dark:text-orange-300 font-black font-mono text-xs sm:text-sm uppercase bg-orange-50 dark:bg-orange-900/40 px-3 py-1 rounded-lg mt-2 inline-block">Registrada: {todayRecord.exit_time}</span>}
                                        {!todayRecord && <span className="text-slate-300 dark:text-slate-600 font-bold text-[10px] uppercase block mt-2">Pendiente de entrada</span>}
                                    </div>
                                </button>
                            </div>

                            {/* Card horas extra */}
                            <div className="bg-white dark:bg-slate-900 p-5 sm:p-7 md:p-8 rounded-[2rem] sm:rounded-[2.5rem] shadow-sm border border-slate-100 dark:border-slate-800 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
                                <div className="flex items-center gap-3 sm:gap-4">
                                    <div className="bg-amber-100 dark:bg-amber-900/40 p-3 rounded-2xl text-amber-600 dark:text-amber-300 shrink-0"><Icon name="Hourglass" /></div>
                                    <div>
                                        <h3 className="font-black text-base sm:text-lg text-slate-800 dark:text-slate-100">Horas extra</h3>
                                        <p className="text-xs text-slate-500 dark:text-slate-400">Maximo 6h por declaracion · sujetas a aprobacion</p>
                                    </div>
                                </div>
                                <button onClick={() => {
                                        if (!todayRecord) { toast('error', 'Necesitas un registro del dia para declarar horas extra.'); return; }
                                        setShowOvertimeModal(true);
                                    }}
                                    className="px-5 sm:px-6 py-3 rounded-2xl bg-amber-500 text-white font-bold hover:bg-amber-600 transition-all shadow-lg shadow-amber-200 dark:shadow-amber-900/30 w-full sm:w-auto">
                                    Declarar horas extra
                                </button>
                            </div>

                            {/* Historial */}
                            <div className="bg-white dark:bg-slate-900 p-5 sm:p-7 md:p-8 rounded-[2rem] sm:rounded-[2.5rem] shadow-sm border border-slate-100 dark:border-slate-800">
                                <h3 className="font-black text-slate-800 dark:text-slate-100 mb-6 sm:mb-8 flex items-center gap-3 uppercase tracking-widest text-xs">
                                    <Icon name="History" className="text-blue-500 dark:text-blue-300 w-4 h-4" /> Mis Jornadas Laborales
                                </h3>
                                <div className="space-y-3 sm:space-y-4">
                                    {logs.map(log => (
                                        <div key={log.id} className="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 p-4 sm:p-6 bg-slate-50/50 dark:bg-slate-800/40 rounded-2xl sm:rounded-3xl border border-slate-100 dark:border-slate-800 hover:bg-white dark:hover:bg-slate-800 hover:shadow-md transition-all">
                                            <div className="w-full">
                                                <p className="text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-2">
                                                    {log.work_date}
                                                    {log.closed_reason === 'forgotten' && ' · cerrado por olvido'}
                                                    {log.closed_reason === 'overtime' && ' · cerrado como extra'}
                                                </p>
                                                <div className="flex items-center gap-3 sm:gap-4 flex-wrap">
                                                    <div className="bg-white dark:bg-slate-900 px-3 sm:px-4 py-2 rounded-xl shadow-sm border border-slate-100 dark:border-slate-800">
                                                        <p className="text-[8px] font-black text-slate-400 dark:text-slate-500 uppercase mb-1">Entrada</p>
                                                        <p className="font-mono font-black text-lg sm:text-xl text-blue-600 dark:text-blue-400 tracking-tight">{log.entry_time}</p>
                                                    </div>
                                                    <div className="bg-white dark:bg-slate-900 px-3 sm:px-4 py-2 rounded-xl shadow-sm border border-slate-100 dark:border-slate-800">
                                                        <p className="text-[8px] font-black text-slate-400 dark:text-slate-500 uppercase mb-1">Salida</p>
                                                        <p className={`font-mono font-black text-lg sm:text-xl tracking-tight ${log.exit_time ? 'text-orange-600 dark:text-orange-400' : 'text-slate-300 dark:text-slate-600'}`}>{log.exit_time || '--:--'}</p>
                                                    </div>
                                                    {log.overtime_hours > 0 && (
                                                        <div className={`px-3 sm:px-4 py-2 rounded-xl shadow-sm border ${
                                                            log.overtime_status === 'approved' ? 'bg-emerald-50 dark:bg-emerald-900/30 border-emerald-100 dark:border-emerald-900' :
                                                            log.overtime_status === 'rejected' ? 'bg-red-50 dark:bg-red-900/30 border-red-100 dark:border-red-900' :
                                                            'bg-amber-50 dark:bg-amber-900/30 border-amber-100 dark:border-amber-900'
                                                        }`}>
                                                            <p className="text-[8px] font-black text-slate-400 dark:text-slate-500 uppercase mb-1">Extra</p>
                                                            <p className={`font-mono font-black text-base sm:text-lg tracking-tight ${
                                                                log.overtime_status === 'approved' ? 'text-emerald-600 dark:text-emerald-300' :
                                                                log.overtime_status === 'rejected' ? 'text-red-500 dark:text-red-300' :
                                                                'text-amber-600 dark:text-amber-300'
                                                            }`}>{log.overtime_hours}h</p>
                                                            <p className="text-[8px] font-black uppercase mt-1">{log.overtime_status}</p>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                            <div className={`w-9 h-9 sm:w-10 sm:h-10 rounded-full flex items-center justify-center shrink-0 ${log.exit_time ? 'bg-emerald-100 dark:bg-emerald-900/40 text-emerald-600 dark:text-emerald-300' : 'bg-slate-100 dark:bg-slate-800 text-slate-300 dark:text-slate-600'}`}>
                                                <Icon name="Check" size={18} />
                                            </div>
                                        </div>
                                    ))}
                                    {logs.length === 0 && <EmptyState message="Aun no tienes registros de asistencia" />}
                                </div>
                            </div>
                        </>
                    )}

                    {/* Modal cambio empresa */}
                    <Modal open={showChangeModal} onClose={() => setShowChangeModal(false)} title="Cambio de empresa">
                        <h3 className="text-xl sm:text-2xl font-black mb-3 text-slate-800 dark:text-slate-100 tracking-tight">Cambio de empresa</h3>
                        <p className="text-slate-500 dark:text-slate-400 text-sm mb-6 sm:mb-8 leading-relaxed">
                            Selecciona la empresa correcta. La solicitud sera revisada por el administrador.
                        </p>
                        <div className="space-y-3 mb-6 sm:mb-8">
                            {companies.filter(c => c.id !== currentUser.company_id).map(c => (
                                <button key={c.id}
                                    onClick={async () => {
                                        try {
                                            await apiFetch('records/change-company', { method: 'POST', body: { new_company_id: c.id } });
                                            toast('success', 'Solicitud enviada.');
                                            setShowChangeModal(false);
                                        } catch (e) { toast('error', e.message); }
                                    }}
                                    className="w-full text-left p-4 sm:p-5 rounded-2xl border-2 border-transparent bg-slate-50 dark:bg-slate-800 hover:border-blue-500 hover:bg-blue-50 dark:hover:bg-blue-900/30 transition-all font-bold flex justify-between items-center group">
                                    <span className="text-slate-700 dark:text-slate-200">{c.name}</span>
                                    <Icon name="ArrowLeftRight" className="w-4 h-4 text-slate-300 dark:text-slate-600 group-hover:text-blue-500" />
                                </button>
                            ))}
                            {companies.filter(c => c.id !== currentUser.company_id).length === 0 && (
                                <EmptyState message="No hay otras empresas disponibles." />
                            )}
                        </div>
                        <button onClick={() => setShowChangeModal(false)} className="w-full py-3 text-slate-400 dark:text-slate-500 font-bold hover:text-slate-600 dark:hover:text-slate-300 uppercase tracking-widest text-[10px]">Cancelar</button>
                    </Modal>

                    {/* Modal horas extra voluntarias */}
                    <Modal open={showOvertimeModal} onClose={() => setShowOvertimeModal(false)} title="Declarar horas extra">
                        <OvertimeForm
                            title="Declarar horas extra"
                            helpText="Indica cuantas horas extra trabajaste hoy (max 6h). Quedaran pendientes hasta aprobacion del administrador."
                            onSubmit={async (hours, reason) => {
                                try {
                                    await apiFetch('records/overtime', { method: 'POST', body: { hours, reason } });
                                    toast('success', 'Horas extra enviadas a aprobacion.');
                                    setShowOvertimeModal(false);
                                    refresh();
                                } catch (e) { toast('error', e.message); }
                            }}
                            onCancel={() => setShowOvertimeModal(false)}
                        />
                    </Modal>

                    {/* Modal decision olvido/extra (devuelto por el servidor) */}
                    <Modal open={!!pendingDecision} onClose={() => {}} title="Jornada anterior sin cerrar" dismissible={false}>
                        <div className="flex items-center gap-3 mb-5">
                            <div className="bg-amber-100 dark:bg-amber-900/40 p-3 rounded-2xl text-amber-600 dark:text-amber-300"><Icon name="AlertTriangle" /></div>
                            <h3 className="text-lg sm:text-xl font-black text-slate-800 dark:text-slate-100">Jornada anterior sin cerrar</h3>
                        </div>
                        <p className="text-slate-500 dark:text-slate-400 text-sm mb-6 leading-relaxed">
                            Tu ultima jornada ({pendingDecision?.priorRecord?.work_date}) no tiene salida. Estas marcando entrada antes de las {String(pendingDecision?.rule?.grace_hour_am || 6).padStart(2,'0')}:00.
                        </p>
                        {!pendingDecision?.declaring ? (
                            <div className="grid grid-cols-1 gap-3">
                                <button onClick={() => setPendingDecision(p => ({ ...p, declaring: true }))}
                                    className="text-left p-5 rounded-2xl border-2 border-amber-100 dark:border-amber-900/50 bg-amber-50 dark:bg-amber-900/20 hover:border-amber-400 transition-all">
                                    <p className="font-black text-amber-700 dark:text-amber-300">Fueron horas extra</p>
                                    <p className="text-xs text-amber-600 dark:text-amber-400 mt-1">Declaro cuantas (max 6h). Quedan pendientes de aprobacion.</p>
                                </button>
                                <button onClick={() => handleClockIn({ declare_overtime: false })}
                                    className="text-left p-5 rounded-2xl border-2 border-slate-100 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 hover:border-slate-400 transition-all">
                                    <p className="font-black text-slate-700 dark:text-slate-200">Olvide marcar salida</p>
                                    <p className="text-xs text-slate-500 dark:text-slate-400 mt-1">Cerramos la jornada anterior a las 18:00 e iniciamos la de hoy.</p>
                                </button>
                            </div>
                        ) : (
                            <OvertimeForm
                                title=""
                                helpText="Indica cuantas horas extra trabajaste despues de las 18:00."
                                onSubmit={(h, r) => handleClockIn({ declare_overtime: true, overtime_hours: h, overtime_reason: r })}
                                onCancel={() => setPendingDecision(p => ({ ...p, declaring: false }))}
                            />
                        )}
                    </Modal>
                </div>
            );
        };

        const OvertimeForm = ({ onSubmit, onCancel, title, helpText }) => {
            const [hours, setHours] = useState(1);
            const [reason, setReason] = useState('');
            const [submitting, setSubmitting] = useState(false);
            const handle = async (e) => {
                e.preventDefault();
                const h = parseFloat(hours);
                if (isNaN(h) || h <= 0 || h > 6) { return; }
                setSubmitting(true);
                try { await onSubmit(h, reason.trim()); }
                finally { setSubmitting(false); }
            };
            return (
                <form onSubmit={handle} className="space-y-5">
                    {title && (
                        <div>
                            <h3 className="text-xl sm:text-2xl font-black text-slate-800 dark:text-slate-100 tracking-tight">{title}</h3>
                            {helpText && <p className="text-sm text-slate-500 dark:text-slate-400 mt-2">{helpText}</p>}
                        </div>
                    )}
                    {!title && helpText && <p className="text-sm text-slate-500 dark:text-slate-400">{helpText}</p>}
                    <div>
                        <label htmlFor="ot-hours" className="text-[10px] font-black uppercase text-slate-400 dark:text-slate-500 ml-4 tracking-widest block">Horas extra (max 6)</label>
                        <input id="ot-hours" type="number" step="0.5" min="0.5" max="6" value={hours} onChange={(e) => setHours(e.target.value)} required
                            className="w-full px-6 sm:px-7 py-4 rounded-2xl sm:rounded-3xl border-2 border-slate-100 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 dark:text-slate-100 outline-none focus:border-amber-500 transition-all font-bold text-lg" />
                    </div>
                    <div>
                        <label htmlFor="ot-reason" className="text-[10px] font-black uppercase text-slate-400 dark:text-slate-500 ml-4 tracking-widest block">Motivo (opcional)</label>
                        <textarea id="ot-reason" value={reason} onChange={(e) => setReason(e.target.value)} rows="3" maxLength="240"
                            placeholder="Ej. Cierre de jornada con el cliente..."
                            className="w-full px-6 sm:px-7 py-4 rounded-2xl sm:rounded-3xl border-2 border-slate-100 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 dark:text-slate-100 outline-none focus:border-amber-500 transition-all font-medium resize-none" />
                    </div>
                    <div className="flex flex-col sm:flex-row gap-3">
                        <button type="button" onClick={onCancel} className="flex-1 py-4 rounded-2xl font-bold text-slate-500 dark:text-slate-300 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors order-2 sm:order-1">Cancelar</button>
                        <button type="submit" disabled={submitting} className="flex-1 py-4 rounded-2xl font-black text-white bg-amber-500 hover:bg-amber-600 transition-colors shadow-lg shadow-amber-200 dark:shadow-amber-900/30 disabled:opacity-60 order-1 sm:order-2 flex items-center justify-center gap-2">
                            {submitting && <Icon name="Spinner" size={18} />}
                            Enviar a aprobacion
                        </button>
                    </div>
                </form>
            );
        };

        // =====================================================================
        // Panel admin
        // =====================================================================

        const AdminPanel = ({ currentUser, onLogout, theme, onToggleTheme }) => {
            const { push: toast } = useToast();
            const [activeTab, setActiveTab] = useState('logs');
            const [records, setRecords] = useState([]);
            const [changeReqs, setChangeReqs] = useState([]);
            const [otReqs, setOtReqs] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);

            const refresh = useCallback(async () => {
                setLoading(true); setError(null);
                try {
                    const [r, cr, ot] = await Promise.all([
                        apiFetch('admin/records'),
                        apiFetch('admin/change-requests'),
                        apiFetch('admin/overtime-requests')
                    ]);
                    setRecords(r.records);
                    setChangeReqs(cr.requests);
                    setOtReqs(ot.requests);
                } catch (e) { setError(e.message); }
                finally { setLoading(false); }
            }, []);

            useEffect(() => { refresh(); }, [refresh]);

            const decide = async (type, id, decision) => {
                try {
                    await apiFetch('admin/decide', { method: 'POST', body: { type, id, decision } });
                    toast('success', `Solicitud ${decision === 'approve' ? 'aprobada' : 'rechazada'}.`);
                    refresh();
                } catch (e) { toast('error', e.message); }
            };

            const pendingChange = changeReqs.length;
            const pendingOt = otReqs.length;

            return (
                <div className="max-w-6xl w-full flex flex-col gap-4 sm:gap-6">
                    {/* Header */}
                    <div className="flex flex-col md:flex-row justify-between items-stretch md:items-center bg-white dark:bg-slate-900 p-4 sm:p-6 rounded-2xl sm:rounded-3xl shadow-sm border border-slate-100 dark:border-slate-800 gap-4">
                        <div className="flex items-center gap-3 sm:gap-4">
                            <div className="bg-slate-900 dark:bg-blue-600 p-3 rounded-2xl text-white"><Icon name="ShieldCheck" /></div>
                            <div>
                                <h2 className="font-black text-lg sm:text-xl text-slate-800 dark:text-slate-100">Melius Admin Console</h2>
                                <p className="text-[10px] sm:text-xs text-slate-400 uppercase font-bold tracking-widest">Gestion de Consultores</p>
                            </div>
                        </div>
                        <div className="flex flex-wrap gap-2 items-center justify-end">
                            <button onClick={() => setActiveTab('logs')} className={`px-3 sm:px-4 py-2 rounded-xl text-xs sm:text-sm font-bold transition-all ${activeTab === 'logs' ? 'bg-slate-900 dark:bg-blue-600 text-white' : 'bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-300'}`}>Registros</button>
                            <button onClick={() => setActiveTab('changes')} className={`px-3 sm:px-4 py-2 rounded-xl text-xs sm:text-sm font-bold flex items-center gap-2 transition-all ${activeTab === 'changes' ? 'bg-slate-900 dark:bg-blue-600 text-white' : 'bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-300'}`}>
                                Cambios {pendingChange > 0 && <span className="w-2 h-2 bg-red-500 rounded-full animate-pulse" />}
                            </button>
                            <button onClick={() => setActiveTab('overtime')} className={`px-3 sm:px-4 py-2 rounded-xl text-xs sm:text-sm font-bold flex items-center gap-2 transition-all ${activeTab === 'overtime' ? 'bg-slate-900 dark:bg-blue-600 text-white' : 'bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-300'}`}>
                                Extras {pendingOt > 0 && <span className="w-2 h-2 bg-amber-500 rounded-full animate-pulse" />}
                            </button>
                            <ThemeToggle theme={theme} onToggle={onToggleTheme} />
                            <button onClick={onLogout} className="px-3 sm:px-4 py-2 rounded-xl text-xs sm:text-sm font-bold text-red-600 bg-red-50 dark:bg-red-900/30 dark:text-red-300">Salir</button>
                        </div>
                    </div>

                    {loading && <LoadingScreen />}
                    {error && !loading && <ErrorState message={error} onRetry={refresh} />}

                    {!loading && !error && activeTab === 'logs' && (
                        <div className="bg-white dark:bg-slate-900 rounded-2xl sm:rounded-3xl shadow-sm border border-slate-100 dark:border-slate-800 overflow-hidden">
                            <div className="p-4 sm:p-6 border-b dark:border-slate-800 bg-slate-50/50 dark:bg-slate-800/50">
                                <h3 className="font-bold flex items-center gap-2 uppercase text-xs tracking-widest text-slate-500 dark:text-slate-400">
                                    <Icon name="FileText" className="text-blue-600 dark:text-blue-400 w-4 h-4" /> Jornadas Laborales
                                </h3>
                            </div>

                            {/* Vista tabla en desktop, cards en mobile (responsive critico) */}
                            <div className="hidden md:block overflow-x-auto custom-scrollbar">
                                <table className="w-full text-left">
                                    <thead className="bg-slate-50 dark:bg-slate-800/60 text-[10px] uppercase font-black text-slate-400 dark:text-slate-500 tracking-wider border-b dark:border-slate-800">
                                        <tr>
                                            <th className="px-6 py-4">Consultor</th>
                                            <th className="px-6 py-4">Empresa</th>
                                            <th className="px-6 py-4">Fecha</th>
                                            <th className="px-6 py-4">Entrada</th>
                                            <th className="px-6 py-4">Salida</th>
                                            <th className="px-6 py-4">Extras</th>
                                            <th className="px-6 py-4">Estado</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y dark:divide-slate-800 text-sm">
                                        {records.map(rec => <AdminRecordRow key={rec.id} rec={rec} />)}
                                        {records.length === 0 && <tr><td colSpan="7" className="px-6 py-20 text-center text-slate-300 dark:text-slate-600 italic">Sin registros aun</td></tr>}
                                    </tbody>
                                </table>
                            </div>
                            <div className="md:hidden divide-y dark:divide-slate-800">
                                {records.map(rec => <AdminRecordCard key={rec.id} rec={rec} />)}
                                {records.length === 0 && <EmptyState message="Sin registros aun" />}
                            </div>
                        </div>
                    )}

                    {!loading && !error && activeTab === 'changes' && (
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-6">
                            {changeReqs.map(req => (
                                <div key={req.id} className="bg-white dark:bg-slate-900 p-5 sm:p-6 rounded-2xl sm:rounded-3xl border border-slate-100 dark:border-slate-800 shadow-sm flex flex-col gap-4 anim-zoom-in">
                                    <div className="flex justify-between items-start">
                                        <div>
                                            <h4 className="font-bold text-base sm:text-lg text-slate-800 dark:text-slate-100">{req.user_name}</h4>
                                            <p className="text-[10px] text-slate-400 dark:text-slate-500 font-black uppercase tracking-widest">Cambio de empresa</p>
                                        </div>
                                        <div className="bg-blue-50 dark:bg-blue-900/40 p-2 rounded-xl text-blue-500 dark:text-blue-300"><Icon name="Mail" size={18} /></div>
                                    </div>
                                    <div className="flex items-center gap-3 bg-slate-50 dark:bg-slate-800/60 p-3 sm:p-4 rounded-2xl">
                                        <div className="text-center flex-1">
                                            <p className="text-[9px] text-slate-400 font-black uppercase">Actual</p>
                                            <p className="font-bold text-red-400 dark:text-red-300 text-xs">{req.old_company_name || '—'}</p>
                                        </div>
                                        <Icon name="ArrowLeftRight" className="text-slate-300" size={16} />
                                        <div className="text-center flex-1">
                                            <p className="text-[9px] text-slate-400 font-black uppercase">Nueva</p>
                                            <p className="font-bold text-emerald-500 dark:text-emerald-300 text-xs">{req.new_company_name}</p>
                                        </div>
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={() => decide('change', req.id, 'approve')} className="flex-1 bg-emerald-500 text-white py-2.5 sm:py-3 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-emerald-600 text-sm"><Icon name="Check" size={16} /> Aprobar</button>
                                        <button onClick={() => decide('change', req.id, 'reject')} className="flex-1 bg-red-50 dark:bg-red-900/30 text-red-500 dark:text-red-300 py-2.5 sm:py-3 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-red-100 text-sm"><Icon name="X" size={16} /> Rechazar</button>
                                    </div>
                                </div>
                            ))}
                            {pendingChange === 0 && <EmptyState message="No hay solicitudes de cambio pendientes" />}
                        </div>
                    )}

                    {!loading && !error && activeTab === 'overtime' && (
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-6">
                            {otReqs.map(req => (
                                <div key={req.id} className="bg-white dark:bg-slate-900 p-5 sm:p-6 rounded-2xl sm:rounded-3xl border border-slate-100 dark:border-slate-800 shadow-sm flex flex-col gap-4 anim-zoom-in">
                                    <div className="flex justify-between items-start">
                                        <div>
                                            <h4 className="font-bold text-base sm:text-lg text-slate-800 dark:text-slate-100">{req.user_name}</h4>
                                            <p className="text-[10px] text-slate-400 font-black uppercase tracking-widest">Horas extra · {req.date}</p>
                                        </div>
                                        <div className="bg-amber-50 dark:bg-amber-900/40 p-2 rounded-xl text-amber-600 dark:text-amber-300"><Icon name="Hourglass" size={18} /></div>
                                    </div>
                                    <div className="bg-slate-50 dark:bg-slate-800/60 p-3 sm:p-4 rounded-2xl">
                                        <p className="text-[9px] text-slate-400 font-black uppercase mb-1">Horas declaradas</p>
                                        <p className="font-black text-2xl sm:text-3xl text-amber-600 dark:text-amber-300">{req.hours}h</p>
                                        {req.reason && <p className="text-xs text-slate-500 dark:text-slate-400 mt-2 italic break-words">"{req.reason}"</p>}
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={() => decide('overtime', req.id, 'approve')} className="flex-1 bg-emerald-500 text-white py-2.5 sm:py-3 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-emerald-600 text-sm"><Icon name="Check" size={16} /> Aprobar</button>
                                        <button onClick={() => decide('overtime', req.id, 'reject')} className="flex-1 bg-red-50 dark:bg-red-900/30 text-red-500 dark:text-red-300 py-2.5 sm:py-3 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-red-100 text-sm"><Icon name="X" size={16} /> Rechazar</button>
                                    </div>
                                </div>
                            ))}
                            {pendingOt === 0 && <EmptyState message="No hay horas extra pendientes" />}
                        </div>
                    )}
                </div>
            );
        };

        const AdminRecordRow = ({ rec }) => {
            const stateLabel = rec.exit_time
                ? (rec.closed_reason === 'forgotten' ? 'OLVIDO 18:00' : rec.closed_reason === 'overtime' ? 'EXTRA' : 'COMPLETO')
                : 'EN TURNO';
            const stateClass = rec.exit_time
                ? (rec.closed_reason === 'forgotten' ? 'bg-slate-200 text-slate-600 dark:bg-slate-700 dark:text-slate-300' :
                   rec.closed_reason === 'overtime' ? 'bg-violet-100 text-violet-700 dark:bg-violet-900/40 dark:text-violet-300' :
                   'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/40 dark:text-emerald-300')
                : 'bg-amber-100 text-amber-700 dark:bg-amber-900/40 dark:text-amber-300';
            return (
                <tr className="hover:bg-slate-50 dark:hover:bg-slate-800/40 transition-colors">
                    <td className="px-6 py-4 font-bold text-slate-800 dark:text-slate-100">{rec.user_name}</td>
                    <td className="px-6 py-4 text-slate-600 dark:text-slate-300">{rec.company_name || '—'}</td>
                    <td className="px-6 py-4 text-slate-500 dark:text-slate-400 font-medium">{rec.work_date}</td>
                    <td className="px-6 py-4 font-mono font-bold text-blue-600 dark:text-blue-400">{rec.entry_time}</td>
                    <td className="px-6 py-4 font-mono font-bold text-orange-600 dark:text-orange-400">{rec.exit_time || '--:--'}</td>
                    <td className="px-6 py-4 text-xs">{rec.overtime_hours > 0 ? `${rec.overtime_hours}h ${rec.overtime_status}` : '—'}</td>
                    <td className="px-6 py-4"><span className={`px-3 py-1 rounded-full text-[10px] font-black tracking-tighter ${stateClass}`}>{stateLabel}</span></td>
                </tr>
            );
        };

        const AdminRecordCard = ({ rec }) => (
            <div className="p-5 hover:bg-slate-50 dark:hover:bg-slate-800/40 transition-colors">
                <div className="flex justify-between items-start mb-3">
                    <div>
                        <p className="font-bold text-slate-800 dark:text-slate-100">{rec.user_name}</p>
                        <p className="text-xs text-slate-500 dark:text-slate-400">{rec.company_name || 'Sin empresa'}</p>
                    </div>
                    <span className="text-[10px] font-black uppercase tracking-widest text-slate-400">{rec.work_date}</span>
                </div>
                <div className="flex gap-3 text-sm">
                    <div>
                        <p className="text-[9px] font-black uppercase text-slate-400">Entrada</p>
                        <p className="font-mono font-bold text-blue-600 dark:text-blue-400">{rec.entry_time}</p>
                    </div>
                    <div>
                        <p className="text-[9px] font-black uppercase text-slate-400">Salida</p>
                        <p className="font-mono font-bold text-orange-600 dark:text-orange-400">{rec.exit_time || '--:--'}</p>
                    </div>
                    {rec.overtime_hours > 0 && (
                        <div>
                            <p className="text-[9px] font-black uppercase text-slate-400">Extra</p>
                            <p className="font-mono font-bold text-amber-600 dark:text-amber-300">{rec.overtime_hours}h ({rec.overtime_status})</p>
                        </div>
                    )}
                </div>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ToastProvider><App /></ToastProvider>);
    </script>
</body>
</html>
